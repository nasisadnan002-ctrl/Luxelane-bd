<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxelane BD</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #f5f5f5;
}

/* Navbar */
.navbar {
  background: #111;
  color: #fff;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.cart-btn {
  cursor: pointer;
  background: #fff;
  color: #000;
  padding: 8px 15px;
  border-radius: 20px;
}

/* Products */
.container {
  padding: 30px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.product {
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  transition: 0.3s;
}

.product:hover {
  transform: translateY(-5px);
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.product h3 {
  margin: 10px 0;
}

.product button {
  background: black;
  color: white;
  padding: 8px 12px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

/* Cart */
.cart {
  position: fixed;
  right: -350px;
  top: 0;
  width: 350px;
  height: 100%;
  background: #fff;
  padding: 20px;
  box-shadow: -2px 0 10px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.cart.active {
  right: 0;
}

.cart h2 {
  margin-bottom: 15px;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.checkout {
  margin-top: 20px;
  width: 100%;
  padding: 10px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  background: #111;
  color: white;
  margin-top: 30px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">Luxelane BD</div>
  <div class="cart-btn" onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</div>
</div>

<!-- Products -->
<div class="container">
  <h2>Our Collection</h2>
  <div class="products" id="product-list"></div>
</div>

<!-- Cart -->
<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
  <h3>Total: ৳<span id="total">0</span></h3>
  <button class="checkout">Checkout</button>
</div>

<footer>
  © 2026 Luxelane BD | Premium Clothing Store
</footer>

<script>
const products = [
  { id: 1, name: "Stylish Panjabi", price: 1200, img: "https://via.placeholder.com/250" },
  { id: 2, name: "Casual Shirt", price: 900, img: "https://via.placeholder.com/250" },
  { id: 3, name: "Denim Jacket", price: 2200, img: "https://via.placeholder.com/250" },
  { id: 4, name: "Premium T-Shirt", price: 700, img: "https://via.placeholder.com/250" }
];

let cart = [];

const productList = document.getElementById("product-list");
const cartItems = document.getElementById("cart-items");
const totalDisplay = document.getElementById("total");
const cartCount = document.getElementById("cart-count");

function renderProducts() {
  products.forEach(p => {
    productList.innerHTML += `
      <div class="product">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>৳${p.price}</p>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  cart.push(product);
  updateCart();
}

function updateCart() {
  cartItems.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    total += item.price;
    cartItems.innerHTML += `
      <div class="cart-item">
        <span>${item.name}</span>
        <span>৳${item.price}</span>
      </div>
    `;
  });

  totalDisplay.innerText = total;
  cartCount.innerText = cart.length;
}

function toggleCart() {
  document.getElementById("cart").classList.toggle("active");
}

renderProducts();
</script>

</body>
</html>
